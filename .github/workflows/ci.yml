{
  "name": "CI",
  "on": {
    "push": {
      "branches": [
        "main"
      ]
    },
    "pull_request": null
  },
  "jobs": {
    "opa-gate": {
      "permissions": {
        "contents": "read",
        "security-events": "write"
      },
      "runs-on": "ubuntu-24.04",
      "env": {
        "OS": "ubuntu-24.04"
      },
      "steps": [
        {
          "name": "Checkout",
          "uses": "actions/checkout@v4",
          "with": {
            "fetch-depth": 0
          }
        },
        {
          "name": "Install OPA",
          "run": "curl -sL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static \n  -o /usr/local/bin/opa && chmod +x /usr/local/bin/opa",
          "shell": "bash"
        },
        {
          "name": "Check Rego syntax",
          "run": "opa check policy/",
          "shell": "bash"
        },
        {
          "name": "Eval SLSA gate (dry-run)",
          "run": "echo '{}' | opa eval --bundle policy/ 'data.dps.meta.slsa.violation' || true",
          "shell": "bash"
        },
        {
          "name": "Generate SARIF",
          "run": "opa eval --format sarif --bundle policy/ 'data' > opa.sarif || true",
          "shell": "bash",
          "if": "always()"
        },
        {
          "name": "Upload SARIF",
          "uses": "github/codeql-action/upload-sarif@v3",
          "with": {
            "sarif-file": "opa.sarif",
            "category": "opa"
          },
          "if": "always()"
        }
      ]
    },
    "build": {
      "permissions": {
        "contents": "read"
      },
      "runs-on": "ubuntu-24.04",
      "env": {
        "OS": "ubuntu-24.04"
      },
      "steps": [
        {
          "name": "Checkout",
          "uses": "actions/checkout@v4",
          "with": {
            "fetch-depth": 0
          }
        },
        {
          "name": "Build",
          "run": "ROS_VER=26.02.116\ncurl -sL \"https://github.com/roswell/roswell/releases/download/v${ROS_VER}/roswell_${ROS_VER}-1_amd64.deb\" -o /tmp/roswell.deb\nsudo dpkg -i /tmp/roswell.deb\nros install qlot\nqlot install\nqlot exec ros run \\\n  --eval \"(push (truename \\\".\\\") asdf:*central-registry*)\" \\\n  --eval \"(asdf:test-system :edm-engine/tests/all)\" \\\n  --eval \"(uiop:quit 0)\"",
          "shell": "bash"
        },
        {
          "name": "Hash artifact",
          "id": "hash",
          "run": "sha256sum edm-engine > edm-engine.sha256\necho \"sha256=$(base64 -w0 < edm-engine.sha256)\" >> $GITHUB_OUTPUT",
          "shell": "bash",
          "if": "startsWith(github.ref, 'refs/tags/v')"
        },
        {
          "name": "Upload artifact",
          "uses": "actions/upload-artifact@v4",
          "with": {
            "name": "edm-engine",
            "path": "edm-engine\nedm-engine.sha256"
          },
          "if": "startsWith(github.ref, 'refs/tags/v')"
        }
      ]
    },
    "sbom": {
      "permissions": {
        "contents": "read"
      },
      "runs-on": "ubuntu-24.04",
      "env": {
        "OS": "ubuntu-24.04"
      },
      "steps": [
        {
          "name": "Checkout",
          "uses": "actions/checkout@v4",
          "with": {
            "fetch-depth": 0
          }
        },
        {
          "name": "Setup Node",
          "uses": "actions/setup-node@v4",
          "with": {
            "node-version": "20"
          }
        },
        {
          "name": "Install cdxgen",
          "run": "npm install -g @cyclonedx/cdxgen",
          "shell": "bash"
        },
        {
          "name": "Generate SBOM",
          "run": "cdxgen --type generic --output sbom.json .",
          "shell": "bash"
        },
        {
          "name": "Scan CVEs",
          "run": "osv-scanner --sbom sbom.json --format table || true",
          "shell": "bash"
        },
        {
          "name": "Upload SBOM",
          "uses": "actions/upload-artifact@v4",
          "with": {
            "name": "sbom.json",
            "path": "sbom.json"
          },
          "if": "always()"
        }
      ]
    }
  }
}